# GoReleaser configuration for Ma'at.
# https://goreleaser.com — validated with `goreleaser check`.
version: 2

project_name: maat

before:
  hooks:
    - go mod tidy

builds:
  - id: maat
    main: .
    binary: maat
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      # Inject the release version into the engine package. Matches the
      # resolution in internal/maat/util.go (var version).
      - -s -w -X github.com/getmaat/maat/internal/maat.version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: maat
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: getmaat
    name: maat
  draft: false
  prerelease: auto

# NOTE: Homebrew publishing is intentionally NOT done via GoReleaser's `brews:`
# block — that generates a Cask on current GoReleaser, which is macOS-only and
# triggers Gatekeeper on our unsigned binary. Instead, the release workflow runs
# scripts/render-homebrew-formula.sh to publish a cross-platform *formula* to the
# tap (macOS + Linuxbrew, no quarantine). See docs/guides/development.md.
