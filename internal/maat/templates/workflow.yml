name: Ma'at

# Validates that documentation stayed in sync with code on every pull request.
# Ma'at is a single static binary, installed here with no language toolchain, so
# this gate works regardless of what this repository is written in.
on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Ma'at
        # Downloads a released static binary (macOS/Linux) — no Go required.
        # MAAT_VERSION pins the version for reproducible CI; keep it in step
        # with the `maat_version` constraint in .maat.yml. Leave it empty to
        # track the latest release.
        env:
          MAAT_VERSION: "{{MAAT_VERSION}}"
          MAAT_INSTALL_DIR: /usr/local/bin
        run: curl -sSf https://raw.githubusercontent.com/getmaat/maat/main/scripts/install.sh | sh

      - name: Run maat check
        run: maat check --format github

# Alternatively, replace the two steps above with the published composite action:
#
#   - uses: getmaat/maat@{{MAAT_ACTION_REF}}
#     with:
#       version: "{{MAAT_VERSION}}"   # optional; empty = latest
#
# or call the reusable workflow from your own workflow file:
#
#   jobs:
#     maat:
#       uses: getmaat/maat/.github/workflows/maat-check.yml@{{MAAT_ACTION_REF}}
#       with:
#         maat_version: "{{MAAT_VERSION}}"
