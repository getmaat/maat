name: Ma'at

# Validates that documentation stayed in sync with code on every pull request.
on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build maat
        run: go build -o "$RUNNER_TEMP/maat" .
      - name: Run maat check
        run: '"$RUNNER_TEMP/maat" check --format github'
